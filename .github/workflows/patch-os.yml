name: Patch OS Workflow

on:
    repository_dispatch: 
        types: 
            - patch-os

jobs:
    test:
        runs-on: self-hosted

        steps:
            - name: Print Payload
              run: |
                echo "🚀 Workflow triggered from ServiceNow!"
                echo "Change Number: ${{ github.event.client_payload.number }}"
                echo "Sys ID: ${{ github.event.client_payload.sys_id }}"
                echo "VM Name: ${{ github.event.client_payload.vm_name }}"
                echo "VM IP: ${{ github.event.client_payload.vm_ip }}"
                echo "SSH User: ${{ github.event.client_payload.ssh_user }}"
                echo "Environment: ${{ github.event.client_payload.environment }}"
                echo "Resource Group: ${{ github.event.client_payload.resource_group }}"
                echo "Snapshot Required: ${{ github.event.client_payload.snapshot_required }}"
                echo "Reboot After Patch: ${{ github.event.client_payload.reboot_after_patch }}"

            - name: Create Azure Snapshot
              if: ${{ github.event.client_payload.snapshot_required == 'true' }}
              shell: bash
              run: |
                echo "📸 Snapshot requested. Creating OS disk snapshot for ${{ github.event.client_payload.vm_name }}..."
                
                # Get the OS Disk ID of the VM
                OS_DISK_ID=$(az vm show \
                  -g "${{ github.event.client_payload.resource_group }}" \
                  -n "${{ github.event.client_payload.vm_name }}" \
                  --query "storageProfile.osDisk.managedDisk.id" \
                  -o tsv | tr -d '\r')
                  
                if [ -z "$OS_DISK_ID" ]; then
                  echo "❌ Could not find OS Disk for VM. Snapshot failed."
                  exit 1
                fi
                
                SNAPSHOT_NAME="snap-${{ github.event.client_payload.vm_name }}-$(date +%s)"
                
                # Create the Snapshot in the same Resource Group
                az snapshot create \
                  -g "${{ github.event.client_payload.resource_group }}" \
                  -n "$SNAPSHOT_NAME" \
                  --source "$OS_DISK_ID" \
                  --query "id" -o tsv
                  
                echo "✅ Snapshot $SNAPSHOT_NAME created successfully."

            - name: Setup SSH Key
              shell: bash
              run: |
                mkdir -p ~/.ssh
                echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/id_rsa
                chmod 600 ~/.ssh/id_rsa

            - name: Run OS Patching via SSH
              shell: bash
              run: |
                echo "🚀 Starting OS Patching..."
                
                ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa ${{ github.event.client_payload.ssh_user }}@${{ github.event.client_payload.vm_ip }} << 'EOF'
                  set -e
                  echo "Current Kernel: $(uname -r)"
                  
                  sudo apt-get update -y
                  sudo DEBIAN_FRONTEND=noninteractive apt-get upgrade -y dist
                  
                  if [ -f /var/run/reboot-required ] && [ "${{ github.event.client_payload.reboot_after_patch }}" == "true" ]; then
                    echo "Reboot required and authorized. Initiating reboot..."
                    sudo reboot &
                  else
                    echo "No reboot required or authorized."
                  fi
                EOF
                
                echo "✅ Patching complete!"