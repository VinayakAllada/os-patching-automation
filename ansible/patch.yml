---
- name: OS Patching and Compliance
  hosts: all
  become: yes
  gather_facts: yes

  tasks:
    - name: Get pre-patch kernel version
      command: uname -r
      register: pre_patch_kernel
      changed_when: false

    - name: Update apt cache and upgrade all packages
      apt:
        update_cache: yes
        upgrade: dist
      register: apt_upgrade

    - name: Check if reboot is required
      stat:
        path: /var/run/reboot-required
      register: reboot_required_file

    - name: Set reboot required fact
      set_fact:
        is_reboot_required: "{{ reboot_required_file.stat.exists }}"

    - name: Conditionally reboot the VM if required and allowed
      reboot:
        msg: "Reboot initiated by Ansible for OS Patching"
        connect_timeout: 5
        reboot_timeout: 600
        pre_reboot_delay: 0
        post_reboot_delay: 30
        test_command: whoami
      when: is_reboot_required and (reboot_after_patch | default('false') | bool)

    - name: Get post-patch kernel version
      command: uname -r
      register: post_patch_kernel
      changed_when: false

    - name: Generate compliance report
      set_fact:
        patch_report:
          pre_patch_kernel: "{{ pre_patch_kernel.stdout }}"
          post_patch_kernel: "{{ post_patch_kernel.stdout }}"
          packages_updated: "{{ apt_upgrade.changed }}"
          reboot_was_required: "{{ is_reboot_required }}"
          reboot_performed: "{{ is_reboot_required and (reboot_after_patch | default('false') | bool) }}"
          timestamp: "{{ ansible_date_time.iso8601 }}"

    - name: Output compliance report (for GitHub Actions to capture)
      debug:
        msg: "COMPLIANCE_REPORT: {{ patch_report | to_json }}"
