name: Patch OS Workflow

on:
    repository_dispatch: 
        types: 
            - patch-os

jobs:
    test:
        runs-on: self-hosted

        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Print Payload
              run: |
                echo "🚀 Workflow triggered from ServiceNow!"
                echo "Change Number: ${{ github.event.client_payload.number }}"
                echo "Sys ID: ${{ github.event.client_payload.sys_id }}"
                echo "VM Name: ${{ github.event.client_payload.vm_name }}"
                echo "VM IP: ${{ github.event.client_payload.vm_ip }}"
                echo "SSH User: ${{ github.event.client_payload.ssh_user }}"
                echo "Environment: ${{ github.event.client_payload.environment }}"
                echo "Resource Group: ${{ github.event.client_payload.resource_group }}"
                echo "Snapshot Required: ${{ github.event.client_payload.snapshot_required }}"
                echo "Reboot After Patch: ${{ github.event.client_payload.reboot_after_patch }}"

            - name: Create Azure Snapshot
              if: ${{ github.event.client_payload.snapshot_required == 'true' }}
              run: |
                echo "📸 Snapshot requested. Creating OS disk snapshot for ${{ github.event.client_payload.vm_name }}..."
                
                # Get the OS Disk ID of the VM
                OS_DISK_ID=$(az vm show \
                  -g "${{ github.event.client_payload.resource_group }}" \
                  -n "${{ github.event.client_payload.vm_name }}" \
                  --query "storageProfile.osDisk.managedDisk.id" \
                  -o tsv | tr -d '\r')
                  
                if [ -z "$OS_DISK_ID" ]; then
                  echo "❌ Could not find OS Disk for VM. Snapshot failed."
                  exit 1
                fi
                
                SNAPSHOT_NAME="snap-${{ github.event.client_payload.vm_name }}-$(date +%s)"
                
                # Create the Snapshot in the same Resource Group
                az snapshot create \
                  -g "${{ github.event.client_payload.resource_group }}" \
                  -n "$SNAPSHOT_NAME" \
                  --source "$OS_DISK_ID" \
                  --query "id" -o tsv
                  
                echo "✅ Snapshot $SNAPSHOT_NAME created successfully."

            - name: Setup SSH Key
              run: |
                mkdir -p ~/.ssh
                echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/id_rsa
                chmod 600 ~/.ssh/id_rsa

            - name: Run Ansible Patching Playbook
              env:
                ANSIBLE_CONFIG: ./ansible/ansible.cfg
                ANSIBLE_HOST_KEY_CHECKING: "False"
              run: |
                echo "🚀 Starting Ansible OS Patching..."
                
                # Create a dynamic inventory file for this single run
                echo "[target_vm]" > inventory.ini
                echo "${{ github.event.client_payload.vm_ip }} ansible_user=${{ github.event.client_payload.ssh_user }} ansible_ssh_private_key_file=~/.ssh/id_rsa" >> inventory.ini
                
                # Run the playbook
                ansible-playbook -i inventory.ini ansible/patch.yml \
                  --extra-vars "reboot_after_patch=${{ github.event.client_payload.reboot_after_patch }}"

            - name: Update ServiceNow and Close Ticket
              if: always()
              run: |
                echo "📋 Preparing compliance report for ServiceNow..."
                
                # Check if compliance report was generated
                if [ -f compliance_report.json ]; then
                  REPORT=$(cat compliance_report.json)
                  NOTES="Automated OS Patching Completed Successfully!\\n\\nCompliance Report:\\n$REPORT"
                  STATE=3 # Closed
                  CLOSE_CODE="successful"
                else
                  NOTES="Automated OS Patching Pipeline Failed or did not complete. Please check GitHub Actions logs."
                  STATE=4 # Canceled or you can leave it as Implement and just update notes
                  CLOSE_CODE="unsuccessful"
                fi
                
                echo "Payload to send:"
                echo "$NOTES"
                
                # Create JSON payload for ServiceNow (escaping newlines)
                JSON_PAYLOAD=$(jq -n \
                  --arg notes "$NOTES" \
                  --arg state "$STATE" \
                  --arg code "$CLOSE_CODE" \
                  '{
                    work_notes: $notes,
                    close_notes: $notes,
                    state: $state,
                    close_code: $code
                  }')
                  
                echo "🚀 Sending update to ServiceNow..."
                
                curl -X PATCH "https://dev403266.service-now.com/api/now/table/change_request/${{ github.event.client_payload.sys_id }}" \
                  -H "Accept: application/json" \
                  -H "Content-Type: application/json" \
                  --user "${{ secrets.SN_USERNAME }}:${{ secrets.SN_PASSWORD }}" \
                  -d "$JSON_PAYLOAD"
                  
                echo "✅ ServiceNow ticket updated!"